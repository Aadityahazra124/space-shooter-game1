<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ULTRA PRO Space Shooter</title>
<style>
  body { margin:0; overflow:hidden; background:black; color:white; font-family:Arial; }
  canvas { display:block; margin:auto; background: radial-gradient(circle, #000 40%, #020024 100%); }
  #mobileControls { position:fixed; bottom:20px; width:100%; text-align:center; }
  button { padding:10px 20px; font-size:18px; margin:5px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="mobileControls">
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="moveRight()">➡️</button>
</div>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: canvas.width/2, y: canvas.height-80, size:20, speed:7, health:100 };
let bullets = [], enemies = [], powerUps = [];
let score = 0, gameOver = false, bossActive = false;
let highScore = localStorage.getItem("highScore") || 0;

let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

function moveLeft(){ player.x -= player.speed*2; }
function moveRight(){ player.x += player.speed*2; }

// Sound
function shootSound(){ new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3").play(); }
function hitSound(){ new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3").play(); }

// Shooting
setInterval(()=>{
  if(!gameOver){
    bullets.push({x:player.x,y:player.y});
    shootSound();
  }
},200);

// Enemies
setInterval(()=>{
  if(!gameOver && !bossActive){
    enemies.push({x:Math.random()*canvas.width,y:-20,size:20,speed:2+Math.random()*3});
  }
},600);

// PowerUps
setInterval(()=>{
  if(!gameOver){
    powerUps.push({x:Math.random()*canvas.width,y:-20,size:15,speed:2});
  }
},5000);

// Boss
let boss = {x:canvas.width/2,y:100,size:60,health:200};

function update(){
  if(gameOver) return;

  if(keys["ArrowLeft"]) player.x -= player.speed;
  if(keys["ArrowRight"]) player.x += player.speed;

  bullets.forEach((b,i)=>{ b.y-=10; if(b.y<0) bullets.splice(i,1); });

  enemies.forEach((e,ei)=>{
    e.y+=e.speed;
    if(Math.abs(e.x-player.x)<20 && Math.abs(e.y-player.y)<20){
      player.health-=20; enemies.splice(ei,1); hitSound();
    }
    bullets.forEach((b,bi)=>{
      if(Math.abs(e.x-b.x)<15 && Math.abs(e.y-b.y)<15){
        enemies.splice(ei,1); bullets.splice(bi,1); score++;
      }
    });
  });

  powerUps.forEach((p,pi)=>{
    p.y+=p.speed;
    if(Math.abs(p.x-player.x)<20 && Math.abs(p.y-player.y)<20){
      player.health=Math.min(100,player.health+30);
      powerUps.splice(pi,1);
    }
  });

  // Boss logic
  if(score>=20 && !bossActive){ bossActive=true; }
  if(bossActive){
    bullets.forEach((b,bi)=>{
      if(Math.abs(boss.x-b.x)<50 && Math.abs(boss.y-b.y)<50){
        boss.health-=5; bullets.splice(bi,1);
      }
    });
    if(boss.health<=0){ bossActive=false; score+=50; }
  }

  if(player.health<=0) gameOver=true;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Player
  ctx.fillStyle="cyan";
  ctx.beginPath(); ctx.arc(player.x,player.y,player.size,0,Math.PI*2); ctx.fill();

  // Bullets
  ctx.fillStyle="yellow";
  bullets.forEach(b=>ctx.fillRect(b.x-2,b.y-10,4,10));

  // Enemies
  ctx.fillStyle="red";
  enemies.forEach(e=>{ ctx.beginPath(); ctx.arc(e.x,e.y,e.size,0,Math.PI*2); ctx.fill(); });

  // PowerUps
  ctx.fillStyle="green";
  powerUps.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); });

  // Boss
  if(bossActive){
    ctx.fillStyle="purple";
    ctx.beginPath(); ctx.arc(boss.x,boss.y,boss.size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="white";
    ctx.fillText("Boss HP: "+boss.health, canvas.width/2-40, 50);
  }

  // UI
  ctx.fillStyle="white";
  ctx.fillText("Score: "+score,20,30);
  ctx.fillText("High Score: "+highScore,20,70);

  // Health bar
  ctx.fillStyle="red"; ctx.fillRect(20,90,200,10);
  ctx.fillStyle="lime"; ctx.fillRect(20,90,player.health*2,10);

  if(gameOver){
    if(score>highScore){ localStorage.setItem("highScore",score); }
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER",canvas.width/2-120,canvas.height/2);
    ctx.font="20px Arial";
    ctx.fillText("Final Score: "+score,canvas.width/2-70,canvas.height/2+40);
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
