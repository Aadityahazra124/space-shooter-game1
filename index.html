<!DOCTYPE html>
<html>
<head>
<title>Galaxy Shooter Level 2</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
#menu {
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
button {
  padding:15px 30px;
  font-size:20px;
}
</style>
</head>

<body>

<div id="menu">
  <h1>🚀 GALAXY SHOOTER</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameRunning = false;
let bullets = [];
let enemies = [];
let explosions = [];
let score = 0;

let bgY = 0;

// 🟢 LOAD IMAGES
const playerImg = new Image();
playerImg.src = "https://i.imgur.com/6X12FQp.png";

const enemyImg = new Image();
enemyImg.src = "https://i.imgur.com/Z6X8KZy.png";

const bgImg = new Image();
bgImg.src = "https://i.imgur.com/3e5pRZC.jpg";

// PLAYER
let player = {
  x: canvas.width/2,
  y: canvas.height-120,
  w: 70,
  h: 70,
  speed: 7
};

function startGame(){
  document.getElementById("menu").style.display = "none";
  gameRunning = true;
  gameLoop();
}

// 🎮 CONTROLS
document.addEventListener("mousemove", e=>{
  player.x = e.clientX;
});

document.addEventListener("click", ()=>{
  bullets.push({x:player.x, y:player.y});
});

// 🟣 SPAWN ENEMIES
function spawnEnemies(){
  if(Math.random() < 0.03){
    enemies.push({
      x: Math.random()*canvas.width,
      y: -50,
      speed: Math.random()*3+2
    });
  }
}

// 🔴 DRAW BACKGROUND
function drawBackground(){
  bgY += 2;
  if(bgY > canvas.height) bgY = 0;

  ctx.drawImage(bgImg, 0, bgY - canvas.height, canvas.width, canvas.height);
  ctx.drawImage(bgImg, 0, bgY, canvas.width, canvas.height);
}

// 🟢 DRAW PLAYER
function drawPlayer(){
  ctx.drawImage(playerImg, player.x-35, player.y-35, player.w, player.h);
}

// 🔵 BULLETS
function drawBullets(){
  bullets.forEach((b,i)=>{
    b.y -= 12;

    // glow effect
    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
    ctx.fill();

    if(b.y < 0) bullets.splice(i,1);
  });
}

// 🔴 ENEMIES
function drawEnemies(){
  enemies.forEach((e,i)=>{
    e.y += e.speed;

    ctx.drawImage(enemyImg, e.x-25, e.y-25, 50, 50);

    // collision
    bullets.forEach((b,j)=>{
      if(b.x < e.x+25 && b.x > e.x-25 && b.y < e.y+25 && b.y > e.y-25){
        enemies.splice(i,1);
        bullets.splice(j,1);

        explosions.push({x:e.x, y:e.y, size:0});
        score++;
      }
    });

    if(e.y > canvas.height){
      enemies.splice(i,1);
    }
  });
}

// 💥 EXPLOSION EFFECT
function drawExplosions(){
  explosions.forEach((ex,i)=>{
    ex.size += 2;

    ctx.strokeStyle = "orange";
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.size, 0, Math.PI*2);
    ctx.stroke();

    if(ex.size > 30){
      explosions.splice(i,1);
    }
  });
}

// 🧠 UI
function drawUI(){
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: "+score, 20, 30);
}

// 🔁 GAME LOOP
function gameLoop(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBackground();
  spawnEnemies();
  drawPlayer();
  drawBullets();
  drawEnemies();
  drawExplosions();
  drawUI();

  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
