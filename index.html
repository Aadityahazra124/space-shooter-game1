<!DOCTYPE html>
<html>
<head>
<title>Galaxy Shooter PRO</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
canvas {
  display: block;
}
#menu {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
button {
  padding: 15px 30px;
  font-size: 20px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="menu">
  <h1>🚀 GALAXY SHOOTER</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameRunning = false;
let bullets = [];
let enemies = [];
let boss = null;
let score = 0;

let player = {
  x: canvas.width/2,
  y: canvas.height - 100,
  w: 60,
  h: 60,
  speed: 7,
  hp: 100
};

function startGame(){
  document.getElementById("menu").style.display = "none";
  gameRunning = true;
  gameLoop();
}

document.addEventListener("mousemove", e => {
  player.x = e.clientX;
});

document.addEventListener("click", () => {
  bullets.push({x: player.x, y: player.y});
});

function spawnEnemies(){
  if(Math.random() < 0.03){
    enemies.push({
      x: Math.random()*canvas.width,
      y: -20,
      type: Math.random() > 0.5 ? "fast" : "normal"
    });
  }
}

function spawnBoss(){
  if(score > 50 && !boss){
    boss = {
      x: canvas.width/2,
      y: 100,
      hp: 200,
      attackTimer: 0
    };
  }
}

function drawPlayer(){
  ctx.fillStyle = "cyan";
  ctx.fillRect(player.x-30, player.y-30, player.w, player.h);
}

function drawBullets(){
  ctx.fillStyle = "yellow";
  bullets.forEach(b => {
    b.y -= 10;
    ctx.fillRect(b.x, b.y, 5, 15);
  });
}

function drawEnemies(){
  enemies.forEach((e,i)=>{
    e.y += e.type==="fast"?5:2;
    ctx.fillStyle = e.type==="fast"?"red":"green";
    ctx.fillRect(e.x, e.y, 40, 40);

    bullets.forEach((b,j)=>{
      if(b.x < e.x+40 && b.x > e.x && b.y < e.y+40){
        enemies.splice(i,1);
        bullets.splice(j,1);
        score++;
      }
    });
  });
}

function drawBoss(){
  if(!boss) return;

  ctx.fillStyle = "purple";
  ctx.fillRect(boss.x-80, boss.y-50, 160, 100);

  boss.attackTimer++;
  if(boss.attackTimer % 20 === 0){
    enemies.push({x: boss.x, y: boss.y, type:"fast"});
  }

  bullets.forEach((b,i)=>{
    if(b.x > boss.x-80 && b.x < boss.x+80 && b.y < boss.y+50){
      boss.hp -= 2;
      bullets.splice(i,1);
    }
  });

  if(boss.hp <= 0){
    boss = null;
    score += 50;
  }
}

function drawUI(){
  ctx.fillStyle="white";
  ctx.fillText("Score: "+score, 20, 30);
  ctx.fillText("HP: "+player.hp, 20, 60);
}

function gameLoop(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  spawnEnemies();
  spawnBoss();

  drawPlayer();
  drawBullets();
  drawEnemies();
  drawBoss();
  drawUI();

  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
